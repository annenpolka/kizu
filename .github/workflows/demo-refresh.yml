name: Demo refresh

# Manual demo regeneration. Opens a PR against `main` with a fresh
# `docs/media/demo.gif` so the README stays visually current without
# requiring a maintainer to run `just demo` locally (which needs tmux,
# vhs, and a release binary installed). Kept separate from the release
# workflow so a tagged release doesn't have to wait on PR review.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: vhs / refresh demo.gif
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # vhs-action is still Node 20-only; install the CLI directly so this
      # workflow stays clear of GitHub Actions' Node runtime deprecation.
      - name: Install VHS demo dependencies
        shell: bash
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y ffmpeg tmux ttyd vhs

      - name: Install kizu on PATH
        run: cargo install --path . --locked

      - name: Record demo with vhs
        run: PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH" vhs docs/media/demo.tape

      - name: Open PR with refreshed demo.gif
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/demo-refresh
          title: 'chore: refresh demo.gif via CI'
          commit-message: 'chore: refresh demo.gif via CI'
          body: |
            Auto-refreshed VHS demo from `docs/media/demo.tape`.

            Triggered manually via `workflow_dispatch`. Review the
            playback then merge to update the README preview.
          add-paths: docs/media/demo.gif
          delete-branch: true
